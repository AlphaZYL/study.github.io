<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>联系我们 - 科大菁英工作室</title>
	<style>
		:root {
			--bg: #f4f7ff;
			--card: #ffffff;
			--primary: #2f5bea;
			--text: #1d2433;
			--muted: #5d6b85;
			--shadow: 0 12px 30px rgba(39, 73, 175, 0.12);
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
			background: linear-gradient(180deg, #eef3ff 0%, #f8faff 45%, #ffffff 100%);
			color: var(--text);
			min-height: 100vh;
		}

		.container {
			max-width: 900px;
			margin: 0 auto;
			padding: 56px 20px;
		}

		h1 {
			margin: 0 0 24px;
			font-size: 2rem;
			text-align: center;
		}

		.card {
			background: var(--card);
			border: 1px solid #e4ebff;
			border-radius: 14px;
			box-shadow: var(--shadow);
			padding: 24px;
		}

		.address {
			font-size: 1.1rem;
			margin: 0 0 20px;
			color: var(--text);
		}

		.address strong {
			color: var(--primary);
		}

		.contact-image {
			display: block;
			width: 100%;
			max-width: 420px;
			margin: 0 auto;
			border-radius: 12px;
			box-shadow: 0 10px 24px rgba(39, 73, 175, 0.18);
		}

		.back {
			display: inline-block;
			margin-top: 20px;
			text-decoration: none;
			color: var(--primary);
			font-weight: 700;
		}

		.back:hover {
			text-decoration: underline;
		}
	</style>
</head>
<body>
	<main class="container">
		<p><a href="index.html">← 返回首页</a></p>
		<h1>联系我们</h1>
		<section class="card">
			<p class="address"><strong>地址：</strong>文昌阁地铁站附近。</p>
			<img class="contact-image" src="https://i.postimg.cc/1Xf52XWs/wechat.jpg" alt="联系我们二维码" />
			<a class="back" href="index.html">← 返回首页</a>
		</section>
	</main>
</body>
</html>
